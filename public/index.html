<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Goblinvest</title>
    <link href="https://unpkg.com/tabulator-tables@6.2.5/dist/css/tabulator.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <header id="topbar" hidden>
      <span class="brand">Goblinvest</span>
      <span class="who" id="who"></span>
      <button id="logout-btn" type="button">log out</button>
    </header>

    <main id="app">
      <!-- auth view -->
      <section id="auth-view" hidden>
        <h1>Goblinvest</h1>
        <div class="auth-card">
          <div class="tabs">
            <button type="button" class="tab is-active" data-mode="login">log in</button>
            <button type="button" class="tab" data-mode="signup">sign up</button>
          </div>
          <form id="auth-form" autocomplete="off">
            <label>username
              <input type="text" name="username" required autocomplete="username" />
            </label>
            <label>password
              <input type="password" name="password" required autocomplete="current-password" />
            </label>
            <button type="submit" id="auth-submit">log in</button>
            <div class="auth-error" id="auth-error" hidden></div>
          </form>
        </div>
      </section>

      <!-- dashboard view -->
      <section id="dash-view" hidden>
        <div id="accounts-table"></div>

        <section id="mv-chart-section">
          <div class="section-head">
            <h2>Net worth over time</h2>
            <div class="chart-toolbar">
              <span class="isolated-label" id="mv-isolated-label" hidden></span>
              <button type="button" id="mv-reset">show all</button>
            </div>
          </div>
          <div id="mv-chart"></div>
          <div id="mv-empty" class="empty-state" hidden>No transactions yet — chart will appear once data is loaded.</div>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
